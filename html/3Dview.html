<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <link rel="stylesheet" href="/css/fonts.css" />
    <title>Modeling</title>
    <meta
      name="description"
      content="직접 제작한 3D 모델을 감상하고 다운로드할 수 있는 불방의 모델링 뷰어입니다."
    />

    <style>
      body {
        margin: 0;
        overflow: hidden;
        background-color: black;
        touch-action: none;
        -webkit-overflow-scrolling: none;
        overscroll-behavior: none;
      }
      canvas {
        display: block;
        touch-action: none;
      }
      /* Caption overlay style */
      #caption {
        position: absolute;
        bottom: 0;
        left: 0;
        width: 100%;
        padding: 8px 16px;
        background: rgba(0, 0, 0, 0.3);
        color: #ffffff;
        font-size: 0.8rem;
        line-height: 1.3;
        z-index: 10;
        box-sizing: border-box;
      }
      #caption h2 {
        margin: 0 0 2px 0;
        font-size: 0.95rem;
      }
      #caption p {
        margin: 0;
        font-size: 0.75rem;
        opacity: 0.85;
      }
      @media (max-width: 600px) {
        #caption {
          padding: 6px 12px;
        }
        #caption h2 {
          font-size: 0.8rem;
        }
        #caption p {
          font-size: 0.65rem;
        }
        #lighting-panel {
          width: 200px;
          right: 6px;
          top: 6px;
        }
        #panel-header {
          padding: 8px 10px;
          font-size: 0.78rem;
          min-height: 36px;
        }
        .ctrl-row label {
          flex: 0 0 72px;
          font-size: 0.7rem;
        }
      }


      /* POI annotation labels */
      .poi-label {
        position: absolute;
        pointer-events: auto;
        color: #00ffcc;
        font-family: 'Pretendard', monospace;
        font-size: 0.75rem;
        background: rgba(0, 0, 0, 0.75);
        border: 1px solid rgba(0, 255, 204, 0.4);
        border-radius: 0;
        padding: 0;
        transform: translate(-50%, 8px);
        z-index: 20;
        text-shadow: 0 0 4px rgba(0,255,204,0.5);
        cursor: pointer;
        opacity: 0;
        transition: opacity 0.5s ease;
        pointer-events: none;
      }
      .poi-label.visible {
        opacity: 1;
        pointer-events: auto;
      }
      .poi-label .poi-header {
        display: flex;
        align-items: center;
        gap: 4px;
        padding: 4px 8px;
        white-space: nowrap;
        min-height: 28px;
      }
      .poi-label .poi-header .poi-arrow {
        font-size: 0.55rem;
        transition: transform 0.25s ease;
      }
      .poi-label.open .poi-header .poi-arrow {
        transform: rotate(90deg);
      }
      .poi-label .poi-detail {
        max-height: 0;
        max-width: 0;
        opacity: 0;
        overflow: hidden;
        padding: 0;
        border-top: 1px solid transparent;
        font-size: 0.7rem;
        white-space: nowrap;
        transition: max-height 0.3s ease, max-width 0.3s ease, opacity 0.25s ease 0.05s, padding 0.3s ease, border-color 0.3s ease;
      }
      .poi-label.open .poi-detail {
        max-height: 80px;
        max-width: 280px;
        opacity: 1;
        padding: 4px 8px 6px;
        border-top-color: rgba(0,255,204,0.2);
      }
      .poi-label .poi-detail a {
        color: #00ccff;
        text-decoration: none;
      }
      .poi-label .poi-detail a:hover {
        text-decoration: underline;
        color: #66eeff;
      }
      .poi-label .poi-coords {
        color: #888;
        font-size: 0.6rem;
        margin-top: 3px;
      }
      /* Lighting Control Panel */
      #lighting-panel {
        position: absolute;
        top: 10px;
        right: 10px;
        width: 240px;
        background: rgba(20, 20, 30, 0.92);
        border: 1px solid rgba(255,255,255,0.15);
        border-radius: 0;
        color: #ccc;
        font-family: 'Pretendard', sans-serif;
        font-size: 0.78rem;
        z-index: 30;
        user-select: none;
        overflow: hidden;
      }
      #panel-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 10px 14px;
        cursor: pointer;
        font-size: 0.85rem;
        color: #fff;
        font-weight: 600;
        min-height: 40px;
        -webkit-tap-highlight-color: transparent;
      }
      #panel-header:active {
        background: rgba(255,255,255,0.05);
      }
      #panel-header .panel-arrow {
        font-size: 0.65rem;
        transition: transform 0.3s ease;
        color: #888;
      }
      #lighting-panel.open #panel-header .panel-arrow {
        transform: rotate(180deg);
      }
      #panel-body {
        max-height: 0;
        overflow: hidden;
        transition: max-height 0.35s ease, padding 0.35s ease;
        padding: 0 14px;
      }
      #lighting-panel.open #panel-body {
        max-height: 250px;
        padding: 0 14px 12px;
      }
      .ctrl-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 7px;
      }
      .ctrl-row label {
        flex: 0 0 90px;
        font-size: 0.75rem;
      }
      .ctrl-row input[type="range"] {
        flex: 1;
        margin: 0 6px;
        accent-color: #00ffcc;
        height: 4px;
      }
      .ctrl-row select {
        flex: 1;
        margin-left: 6px;
        background: #1a1a2e;
        color: #ccc;
        border: 1px solid #444;
        border-radius: 0;
        padding: 2px 4px;
        font-size: 0.75rem;
      }
      .ctrl-row .val {
        width: 36px;
        text-align: right;
        font-size: 0.7rem;
        color: #aaa;
      }
      .ctrl-row input[type="checkbox"] {
        accent-color: #00ffcc;
        width: 18px;
        height: 18px;
      }
    </style>
  </head>
  <body>
    <!-- Three.js ES Module (r162: texCoord 다중 UV, KHR_lights_punctual 완전 지원) -->
    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.162.0/build/three.module.js",
          "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.162.0/examples/jsm/"
        }
      }
    </script>
    <script type="module">
      import * as THREE from 'three';
      import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
      import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

      const scene = new THREE.Scene();
      scene.background = new THREE.Color("#000a17");

      const camera = new THREE.PerspectiveCamera(
        45,
        window.innerWidth / window.innerHeight,
        0.1,
        1000
      );
      camera.position.set(0, 2, 20);

      const renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.outputColorSpace = THREE.SRGBColorSpace;
      renderer.toneMapping = THREE.LinearToneMapping;
      renderer.toneMappingExposure = Math.pow(2, 1);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      renderer.setSize(window.innerWidth, window.innerHeight);
      document.body.appendChild(renderer.domElement);

      const controls = new OrbitControls(camera, renderer.domElement);
      controls.enableDamping = true;
      controls.dampingFactor = 0.05;
      controls.target.set(0, 1, 0);
      controls.autoRotate = true;
      controls.autoRotateSpeed = -0.3;
      controls.update();

      // 유휴 타이머: 3초간 조작 없으면 자동 회전 + 주석 숨김
      let poiVisible = false;
      let idleTimer = null;

      function onUserInteract() {
        // 조작 시: 자동 회전 중지, 주석 표시
        controls.autoRotate = false;
        if (!poiVisible) {
          poiVisible = true;
          poiLabels.forEach(l => l.classList.add('visible'));
        }
        // 타이머 리셋
        clearTimeout(idleTimer);
        idleTimer = setTimeout(() => {
          // 5초 경과: 자동 회전 재개, 주석 숨김
          controls.autoRotate = true;
          poiVisible = false;
          poiLabels.forEach(l => {
            l.classList.remove('visible');
            l.classList.remove('open');
          });
        }, 5000);
      }

      renderer.domElement.addEventListener('pointerdown', onUserInteract);
      renderer.domElement.addEventListener('wheel', onUserInteract);
      renderer.domElement.addEventListener('pointermove', (e) => {
        if (e.buttons > 0) onUserInteract();
      });

      // 고정 조명 (UI 없음, 밝기는 exposure로만 조절)
      scene.add(new THREE.AmbientLight(0xffffff, 0.6));
      const dirLight = new THREE.DirectionalLight(0xffffff, 1.5);
      dirLight.position.set(5, 10, 7);
      scene.add(dirLight);

      const gridHelper = new THREE.GridHelper(20, 20, 0xff1414, 0xffffff);
      gridHelper.material.opacity = 0.6;
      gridHelper.material.transparent = true;
      scene.add(gridHelper);

      // 그리드를 모델 크기에 맞게 재조정하는 함수
      function resizeGrid(size) {
        const maxXZ = Math.max(size.x, size.z);
        const gridSize = Math.ceil(maxXZ / 2) * 2 + 4;
        scene.remove(window._currentGrid);
        const newGrid = new THREE.GridHelper(gridSize, gridSize, 0xff1414, 0xffffff);
        newGrid.material.opacity = 0.6;
        newGrid.material.transparent = true;
        scene.add(newGrid);
        window._currentGrid = newGrid;
      }
      window._currentGrid = gridHelper;

      let currentModel;
      const poiMarkers = [];
      const poiLabels = [];
      let edgeLineGroup = null;
      function clearScene() {
        if (currentModel) {
          scene.remove(currentModel);
          currentModel.traverse((child) => {
            if (child.isMesh) {
              child.geometry.dispose();
              const mats = Array.isArray(child.material) ? child.material : [child.material];
              mats.forEach(m => {
                if (m.map) m.map.dispose();
                if (m.normalMap) m.normalMap.dispose();
                m.dispose();
              });
            }
          });
        }
        if (edgeLineGroup) {
          scene.remove(edgeLineGroup);
          edgeLineGroup = null;
        }
        const modeSelect = document.getElementById('render-mode');
        if (modeSelect) modeSelect.value = 'normal';
        poiLabels.forEach(el => el.remove());
        poiLabels.length = 0;
        poiMarkers.length = 0;
        poiVisible = false;
        clearTimeout(idleTimer);
        controls.autoRotate = true;
      }

      const modelConfigs = {
        dino: {
          url: '../models/dino.glb',
          poiPrefix: 'info_',
          poiData: {
            'hand': { type: 'desc', content: '한대 맞으면 바로 천국' },
            'tail': { type: 'desc', content: '꼬리 고기 맛이 참 좋죠.' }
          },
          captionTitle: '공룡 3D 뷰어',
          captionBody: '화면을 클릭하면 각 부위 설명을 확인할 수 있습니다.<br />마우스 좌측 버튼 회전, 우측 버튼 이동, 휠로 줌하며 감상하세요.'
        },
        boolbang: {
          url: '../models/boolbang_POI.glb',
          poiPrefix: 'POI_',
          poiData: {
            'boolbang': { type: 'link', url: 'https://blog.naver.com/post_boolbang', text: '저희 블로그도 있습니다. 많이 놀러와주세요' },
            'backdoor': { type: 'link', url: 'https://boolbang.com', text: '공식 홈페이지는 여기!' },
          },
          captionTitle: '불방 POI 뷰어',
          captionBody: 'GLB에 심어둔 POI 좌표가 주석처럼 표시됩니다.<br />마우스 좌측 버튼 회전, 우측 버튼 좌우 이동, 휠로 줌하며 확인하세요.'
        }
      };

      function loadModel(key) {
        const config = modelConfigs[key];

        document.querySelector('#caption h2').textContent = config.captionTitle;
        document.querySelector('#caption p').innerHTML = config.captionBody;

        clearScene();

        const loader = new GLTFLoader();
        loader.load(
          config.url,
          (gltf) => {
            currentModel = gltf.scene;
            currentModel.scale.set(1.0, 1.0, 1.0);

            // 월드 행렬 갱신 후 바운딩박스로 모델 중앙 정렬
            currentModel.updateMatrixWorld(true);
            const box = new THREE.Box3().setFromObject(currentModel);
            const center = box.getCenter(new THREE.Vector3());
            const size = box.getSize(new THREE.Vector3());
            // XZ 중심을 원점, Y 바닥을 그리드에 맞춤
            currentModel.position.x = -center.x;
            currentModel.position.y = -box.min.y;
            currentModel.position.z = -center.z;
            currentModel.updateMatrixWorld(true);
            scene.add(currentModel);

            // 그리드를 모델 크기에 맞게 조정
            resizeGrid(size);

            // 카메라를 모델 전체가 보이도록 자동 배치
            const maxDim = Math.max(size.x, size.y, size.z);
            const fov = camera.fov * (Math.PI / 180);
            const dist = maxDim / (1.5 * Math.tan(fov / 2)) * 1.4;
            const modelCenterY = size.y / 3;
            camera.position.set(dist * 0.7, modelCenterY + dist * 0.3, dist);
            controls.target.set(0, modelCenterY, 0);
            controls.update();

            // GLB 내장 lights 제거 (exposure만 사용)
            currentModel.traverse((child) => {
              if (child.isLight) child.visible = false;
            });

            // POI 노드를 찾아 라벨 생성
            currentModel.traverse((child) => {
              if (child.name && child.name.startsWith(config.poiPrefix)) {
                const worldPos = new THREE.Vector3();
                child.getWorldPosition(worldPos);

                poiMarkers.push({ obj: child, worldPos: worldPos });

                const label = document.createElement('div');
                label.className = 'poi-label';
                const displayName = child.name.replace(config.poiPrefix, '');
                const poiEntry = config.poiData[displayName] || null;

                let detailHTML = '';
                if (poiEntry && poiEntry.type === 'link') {
                  detailHTML =
                    '<a href="' + poiEntry.url + '" target="_blank" rel="noopener">' + poiEntry.text + '</a>' +
                    '<div class="poi-coords">x: ' + worldPos.x.toFixed(2) +
                    ' y: ' + worldPos.y.toFixed(2) +
                    ' z: ' + worldPos.z.toFixed(2) + '</div>';
                } else {
                  detailHTML = '<span>' + (poiEntry ? poiEntry.content : displayName + ' 부분입니다.') + '</span>';
                }

                label.innerHTML =
                  '<div class="poi-header">' +
                    '<span class="poi-arrow">&#9654;</span>' +
                    '<strong>' + displayName + '</strong>' +
                  '</div>' +
                  '<div class="poi-detail">' + detailHTML + '</div>';

                label.addEventListener('click', (e) => {
                  if (e.target.tagName === 'A') return;
                  e.stopPropagation();
                  label.classList.toggle('open');
                });

                document.body.appendChild(label);
                poiLabels.push(label);
              }
            });
          },
          undefined,
          (error) => console.error("GLTF Load Error:", error)
        );
      }

      loadModel('boolbang');

      const _poiVec = new THREE.Vector3(); // 재사용 벡터 (GC 방지)
      function updatePOILabels() {
        const cw = renderer.domElement.clientWidth;
        const ch = renderer.domElement.clientHeight;
        for (let i = 0; i < poiMarkers.length; i++) {
          const marker = poiMarkers[i];
          const label = poiLabels[i];
          _poiVec.copy(marker.worldPos).project(camera);
          const pos = _poiVec;

          if (pos.z > 1 || !poiVisible) {
            label.style.left = '-9999px';
            continue;
          }

          const x = (pos.x * 0.5 + 0.5) * cw;
          const y = (-pos.y * 0.5 + 0.5) * ch;
          label.style.left = x + 'px';
          label.style.top = y + 'px';
        }
      }

      function animate() {
        requestAnimationFrame(animate);
        controls.update();
        updatePOILabels();
        renderer.render(scene, camera);
      }
      animate();

      // 모바일에서 핀치 줌 시 브라우저 기본 줌 방지
      document.addEventListener('gesturestart', (e) => e.preventDefault());
      document.addEventListener('gesturechange', (e) => e.preventDefault());
      document.addEventListener('gestureend', (e) => e.preventDefault());

      // 안정적인 resize: visualViewport 우선 사용
      function handleResize() {
        const w = window.visualViewport ? window.visualViewport.width : window.innerWidth;
        const h = window.visualViewport ? window.visualViewport.height : window.innerHeight;
        camera.aspect = w / h;
        camera.updateProjectionMatrix();
        renderer.setSize(w, h);
      }
      window.addEventListener("resize", handleResize);
      if (window.visualViewport) {
        window.visualViewport.addEventListener("resize", handleResize);
      }

      // === 렌더 모드 시스템 ===
      function applyRenderMode(mode) {
        // 초기화: 엣지라인 제거
        if (edgeLineGroup) {
          scene.remove(edgeLineGroup);
          edgeLineGroup = null;
        }
        if (currentModel) {
          currentModel.traverse((child) => {
            if (child.isMesh) child.visible = true;
          });
        }

        if (!currentModel) return;

        if (mode === 'edges') {
          edgeLineGroup = new THREE.Group();
          currentModel.traverse((child) => {
            if (child.isMesh) {
              child.visible = false;
              const edges = new THREE.EdgesGeometry(child.geometry, 15);
              const line = new THREE.LineSegments(edges,
                new THREE.LineBasicMaterial({ color: 0xffffff }));
              child.updateWorldMatrix(true, false);
              line.applyMatrix4(child.matrixWorld);
              edgeLineGroup.add(line);
            }
          });
          scene.add(edgeLineGroup);
        }
      }

      // === Control Panel ===
      const toneMappingOptions = {
        'Linear': THREE.LinearToneMapping,
        'ACES Filmic': THREE.ACESFilmicToneMapping
      };

      // toneMapping
      const tmSelect = document.getElementById('tm-select');
      tmSelect.addEventListener('change', () => {
        renderer.toneMapping = toneMappingOptions[tmSelect.value];
      });

      // exposure (2^value → 0이 기본값 1.0, +면 밝게, -면 어둡게)
      const expSlider = document.getElementById('exposure');
      const expVal = document.getElementById('exposure-val');
      expSlider.addEventListener('input', () => {
        const v = parseFloat(expSlider.value);
        renderer.toneMappingExposure = Math.pow(2, v);
        expVal.textContent = v.toFixed(2);
      });

      // render mode
      const renderModeSelect = document.getElementById('render-mode');
      renderModeSelect.addEventListener('change', () => {
        applyRenderMode(renderModeSelect.value);
      });

      // grid toggle
      const gridCb = document.getElementById('grid-cb');
      gridCb.addEventListener('change', () => {
        if (window._currentGrid) window._currentGrid.visible = gridCb.checked;
      });

      // panel toggle (접기/펼치기)
      const panel = document.getElementById('lighting-panel');
      const panelHeader = document.getElementById('panel-header');
      panelHeader.addEventListener('click', () => {
        panel.classList.toggle('open');
      });

      // model select
      const modelSelect = document.getElementById('model-select');
      modelSelect.addEventListener('change', () => {
        loadModel(modelSelect.value);
      });
    </script>

    <!-- Lighting Control Panel -->
    <div id="lighting-panel">
      <div id="panel-header">Controls <span class="panel-arrow">▼</span></div>
      <div id="panel-body">
        <div class="ctrl-row">
          <label>모델</label>
          <select id="model-select">
            <option value="dino">공룡</option>
            <option value="boolbang" selected>불방 POI</option>
          </select>
        </div>

        <div class="ctrl-row">
          <label>toneMapping</label>
          <select id="tm-select">
            <option selected>Linear</option>
            <option>ACES Filmic</option>
          </select>
        </div>

        <div class="ctrl-row">
          <label>exposure</label>
          <input type="range" id="exposure" min="-4" max="4" step="0.01" value="1" />
          <span class="val" id="exposure-val">1.00</span>
        </div>

        <div class="ctrl-row">
          <label>렌더 모드</label>
          <select id="render-mode">
            <option value="normal" selected>기본</option>
            <option value="edges">스트럭처</option>
          </select>
        </div>

        <div class="ctrl-row">
          <label>grid</label>
          <input type="checkbox" id="grid-cb" checked />
        </div>
      </div>
    </div>

    <!-- Caption Overlay -->
    <div id="caption">
      <h2>불방 POI 뷰어</h2>
      <p>
        GLB에 심어둔 POI 좌표가 주석처럼 표시됩니다.<br />
        마우스 좌측 버튼 회전, 우측 버튼 좌우 이동, 휠로 줌하며 확인하세요.
      </p>
    </div>
  </body>
</html>

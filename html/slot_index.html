<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Slot Machine</title>
  <meta name="description" content="슬롯머신 게임 해볼래요?">
  <style>
    body {
      background-color: #000;
      font-family: 'Pretendard', monospace;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      text-align: center;
      flex-direction: column;
      transition: all 0.3s ease;
    }

  #slot-machine {
      background-color: #000;
      padding: 20px;
      border-radius: 0;
      box-shadow: 0 0 0px;
      z-index: 10;
      position: relative;
      border: 5px solid;
      background-image: url("../images/backwave.gif");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      /* 고정 크기로 테마 전환시 레이아웃 변화 방지 */
      min-width: 400px;
      max-width: 400px;
      width: 400px;
      box-sizing: border-box;
    }

    .reel-container {
      display: flex;
      justify-content: center;
      gap: 5px;
      margin-top: 20px;
    }

    .reel {
      width: 60px;
      height: 180px;
      border: 2px solid currentColor;
      background-color: #000000;
      overflow: hidden;
      position: relative;
    }

    .symbol-strip {
      position: absolute;
      top: 0;
      width: 100%;
      transition: top 1s ease-out;
    }

    .symbol {
      width: 100%;
      height: 60px;
      line-height: 60px;
      font-size: 24px;
      text-align: center;
    }

    .yellow-win {
      color: yellow !important;
      font-weight: bold;
    }

    button {
      margin: 5px;
      padding: 7px 10px;
      font-size: 16px;
      border: none;
      cursor: pointer;
      font-family: 'Courier New', monospace;
      transition: all 0.2s ease;
    }

    #result, #money, #stage-info, #spin-count {
      margin-top: 10px;
      font-size: 18px;
      min-height: 24px; /* 고정 높이로 레이아웃 안정화 */
    }

    #guide {
      margin-top: 20px;
      font-size: 14px;
      min-height: 40px; /* 고정 높이로 레이아웃 안정화 */
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    #bet-options {
      margin-top: 10px;
      display: flex;
      align-items: center;
      justify-content: center; 
      gap: 2px;                
      margin-top: 10px;
      
      
      
    }

    /* Theme: x1 (흰색) */
    .theme-x1 {
      color: #02b7ff;
    }
    .theme-x1 #slot-machine {
      border-color: #02b7ff;
    }
    .theme-x1 button {
      background-color: #ff0000;
      color: #000;
    }
    .theme-x1 button:hover {
      background-color: #e100ff;
    }

    /* Theme: x2 (녹색) */
    .theme-x2 {
      color: #0f0;
    }
    .theme-x2 #slot-machine {
      border-color: #0f0;
    }
    .theme-x2 button {
      background-color: #ff0000;
      color: #000;
    }
    .theme-x2 button:hover {
      background-color: #e100ff;
    }

    /* Theme: x5 (빨간색) */
    .theme-x5 {
      color: #f00;
    }
    .theme-x5 #slot-machine {
      border-color: #f00;
    }
    .theme-x5 button {
      background-color: #f00;
      color: #000;
    }
    .theme-x5 button:hover {
      background-color: #e100ff;
    }

    @keyframes blink {
  0%, 100% { opacity: 1; }
  50% { opacity: 0; }
}

.yellow-win {
  color: rgb(255, 255, 255) !important;
  font-weight: bold;
  animation: blink 0.5s infinite;
}

@keyframes title-blink {
  0%, 100% { opacity: 1; }
  50% { opacity: 0; }
}

#slot-machine h1 {
  animation: title-blink 0.3s infinite;
}

@keyframes crazy-blink {
  0%, 49% { opacity: 1; }
  50%, 100% { opacity: 0; }
}

#slot-machine.crazy-blink {
  animation: crazy-blink 0.2s infinite;
}

#slot-machine.stage-transition {
  background-image: url("../images/stage.gif");
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
}

/* 모바일 반응형 */
@media (max-width: 600px) {
  #slot-machine {
    min-width: 90vw;
    max-width: 90vw;
    width: 90vw;
    padding: 15px;
  }

  #result, #money, #stage-info, #spin-count {
    font-size: 16px;
  }

  #guide {
    font-size: 12px;
  }

  button {
    font-size: 14px;
    padding: 6px 8px;
  }

  #slot-ranking {
    width: 90vw;
  }
}

  /* 간단 순위표 */
  #slot-ranking {
    width: 400px;
    max-width: 90vw;
    box-sizing: border-box;
    margin-top: 14px;
    color: #ffffff;
    font-family: 'Courier New', monospace;
    font-size: 12px;
  }
  #slot-ranking .rank-title {
    text-align: center;
    font-size: 13px;
    margin-bottom: 6px;
    opacity: 0.85;
  }
  #slot-ranking ol {
    list-style: none;
    margin: 0;
    padding: 0;
  }
  #slot-ranking li {
    display: flex;
    justify-content: space-between;
    gap: 8px;
    padding: 2px 6px;
    border-bottom: 1px solid rgba(255, 255, 255, 0.15);
  }
  #slot-ranking .rk-name {
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  #slot-ranking .rk-score {
    opacity: 0.9;
    flex: 0 0 auto;
  }

  </style>
</head>
<body class="theme-x1">
  <audio id="bgm" src="../BGM/MA_Elena_Anisimova_Night_Movements_Main.mp3" loop></audio>
  <audio id="click-sound" src="../BGM/btn.mp3"></audio>
  <audio id="win-sound" src="../BGM/bonus.mp3"></audio>

  <div id="slot-machine">
    <img src="../images/bluefire.gif" alt="불" style="width: 40px; vertical-align: middle;" />
    <img src="../images/bluefire.gif" alt="불" style="width: 40px; vertical-align: middle;" />
    <img src="../images/bluefire.gif" alt="불" style="width: 40px; vertical-align: middle;" />
    <h1>지옥의 슬롯머신</h1>
    <div id="stage-info"></div>
    <div id="spin-count"></div>
    <div class="reel-container" id="reels"></div>

    <div id="bet-options">
      
      <button onclick="setBet(1)">1배</button>
      <button onclick="setBet(2)">2배</button>
      <button onclick="setBet(5)">5배</button>
    </div>

    <button id="spin-button">돌려!</button>
    <button id="restart-button" style="display:none;">Restart</button>

    <div id="result"></div>
    <div id="money"></div>
    <div id="guide">
      <strong>룰:</strong> <span id="symbol-guide"></span>
    </div>
  </div>

  <div id="slot-ranking">
    <div class="rank-title">🏆 최고 기록 (도달 스테이지)</div>
    <ol id="rank-list"></ol>
  </div>

  <script>
    const clickSound = document.getElementById('click-sound');
    const winSound = document.getElementById('win-sound');
    

document.querySelectorAll('button').forEach(btn => {
  btn.addEventListener('click', () => {
    clickSound.volume = 0.3
    clickSound.currentTime = 0; // 매번 처음부터 재생
    clickSound.play().catch(() => {}); // 모바일 제한 방지용
  });
});

    const symbols = ['★', '♦', '♠', '♣', '♥'];

    // 심볼 출현 가중치 (★이 가장 희귀 → 대박의 손맛). 가중치 합 = 50
    const symbolWeights = { '★': 2, '♦': 5, '♠': 9, '♣': 14, '♥': 20 };
    const weightedPool = [];
    for (const s in symbolWeights) for (let i = 0; i < symbolWeights[s]; i++) weightedPool.push(s);
    function weightedSymbol() { return weightedPool[Math.floor(Math.random() * weightedPool.length)]; }

    // 기본 보상 테이블 (Stage 1 기준). 스테이지마다 REWARD_SCALE배씩 증가
    const baseScores = {
      '★': 2500,  // 가장 높은 보상 (희귀)
      '♦': 320,
      '♠': 100,
      '♣': 40,
      '♥': 15     // 가장 낮은 보상 (흔함)
    };
    // 보상 성장률(1.86)을 베팅 성장률(2)보다 낮게 → 스테이지가 오를수록
    // 서서히 불리해지고 결국 파산하는 난이도 벽을 형성 (스테이지 15 부근)
    const REWARD_SCALE = 1.86;

    // 게임 상태 변수
    // money: 현재 자금, stage: 현재 스테이지, target: 클리어 목표(빚)
    // spinCount: 총 플레이 횟수, betMultiplier: 베팅 배율 (1, 2, 5배)
    let money = 200, stage = 1, target = 400, spinCount = 0, betMultiplier = 1;
    let bgmStarted = false;
    let gameEnded = false; // 파산 후 중복 저장 방지

    const reelsContainer = document.getElementById('reels');
    const resultDisplay = document.getElementById('result');
    const moneyDisplay = document.getElementById('money');
    const spinButton = document.getElementById('spin-button');
    const restartButton = document.getElementById('restart-button');
    const stageInfoDisplay = document.getElementById('stage-info');
    const spinCountDisplay = document.getElementById('spin-count');
    const symbolGuide = document.getElementById('symbol-guide');
    const bgm = document.getElementById('bgm');
    bgm.volume = 0.3;

    const reelCount = 3;
    const rowCount = 3;
    const spinSymbolsCount = 30;
    let strips = [];

    function setBet(x) {
      betMultiplier = x;
      document.body.classList.remove('theme-x1', 'theme-x2', 'theme-x5');
      document.body.classList.add(`theme-x${x}`);
      updateDisplay();
    }

    // 현재 베팅금 계산 (지수적 증가)
    // Stage 1: 10만원, Stage 2: 20만원, Stage 3: 40만원, Stage 4: 80만원...
    // betMultiplier로 1배, 2배, 5배 선택 가능
    function currentBet() {
      return (10 * Math.pow(2, stage - 1)) * betMultiplier;
    }

    // 스테이지에 따라 보상을 지수적으로 증가 (베팅 증가와 균형 맞춤)
    // Stage 1: 기본 보상 (★=500)
    // Stage 2: 2배 보상 (★=1000)
    // Stage 3: 4배 보상 (★=2000)
    // Stage 4: 8배 보상 (★=4000)...
    // 이제 무한 스테이지 플레이 가능!
    function getScores() {
      const stageMultiplier = Math.pow(REWARD_SCALE, stage - 1);

      const scores = {};
      for (let symbol in baseScores) {
        scores[symbol] = Math.round(baseScores[symbol] * stageMultiplier);
      }

      return scores;
    }

    function updateSymbolGuide() {
      const scores = getScores();
      symbolGuide.textContent = symbols.map(s => `${s}=${scores[s] * betMultiplier}`).join(', ');
    }

    function updateStageInfo() {
      stageInfoDisplay.textContent = `Stage ${stage} | 빚: ${target}만원`;
    }

    function updateDisplay() {
      moneyDisplay.textContent = `자금: ${money}만원`;
      spinCountDisplay.textContent = `베팅금액: ${currentBet()}만원`;
      updateStageInfo();
      updateSymbolGuide();
    }

    function initReels() {
      reelsContainer.innerHTML = '';
      strips = [];
      for (let col = 0; col < reelCount; col++) {
        const reel = document.createElement('div');
        reel.className = 'reel';
        const strip = document.createElement('div');
        strip.className = 'symbol-strip';
        for (let i = 0; i < spinSymbolsCount; i++) {
          const symbol = document.createElement('div');
          symbol.className = 'symbol';
          symbol.textContent = weightedSymbol();
          strip.appendChild(symbol);
        }
        reel.appendChild(strip);
        reelsContainer.appendChild(reel);
        strips.push(strip);
      }
    }

    function gameOver() {
      if (gameEnded) return; // 중복 호출/저장 방지
      gameEnded = true;
      resultDisplay.textContent = '파산! 사채업자 등장.';
      spinButton.disabled = true;
      restartButton.style.display = 'inline-block';

      // 랭킹 저장: 도달 스테이지가 점수
      const reached = stage;
      const name = prompt(`파산! 도달 스테이지: ${reached}\n랭킹에 남길 닉네임을 입력하세요:`);
      if (name && window.saveSlotScore) {
        window.saveSlotScore(name.trim().slice(0, 20), reached);
      }
    }

    function nextStage() {
      stage++;
      target = Math.round(target * 1.8); // 빚 성장률(1.8) < 이전 2배 → 완만
      resultDisplay.textContent = `✔️ 빚 갚음! 다음 빚: ${target}만원`;

      const machine = document.getElementById('slot-machine');
      machine.classList.add('stage-transition');

      setTimeout(() => {
      machine.classList.remove('stage-transition');
      }, 3000); // 3초 뒤 자동 제거

  updateDisplay();
    }

function spin() {
  const minBet = 10 * Math.pow(2, stage - 1); // 1배 기준 베팅금
  const bet = minBet * betMultiplier;         // 실제 베팅금

  if (money < minBet) {
    gameOver();
    return;
  }

  if (money < bet) {
    resultDisplay.textContent = '잔액이 부족합니다. 배율을 낮춰주세요.';
    return;
  }

  document.querySelectorAll('.symbol').forEach(el => el.classList.remove('yellow-win'));
  money -= bet;
  spinCount++;
  updateDisplay();
  resultDisplay.textContent = '제발~~';
  spinButton.disabled = true;

  const grid = [[], [], []];
  const targets = [];

  strips.forEach((strip, col) => {
    const maxIndex = spinSymbolsCount - rowCount - 1;
    const targetIndex = Math.floor(Math.random() * maxIndex) + 1;
    // 착지할 3칸을 가중 확률로 새로 뽑아 결과 확률을 보장 (매 스핀 i.i.d.)
    for (let row = 0; row < rowCount; row++) {
      strip.children[targetIndex + row].textContent = weightedSymbol();
    }
    const topOffset = -(targetIndex * 60);
    strip.style.transition = 'top 0.9s ease-out';
    strip.style.top = `${topOffset}px`;
    targets.push(targetIndex);
  });

  setTimeout(() => {
    for (let col = 0; col < reelCount; col++) {
      for (let row = 0; row < rowCount; row++) {
        const el = strips[col].children[targets[col] + row];
        grid[col][row] = { value: el.textContent, element: el };
      }
    }

    const lines = [
      [grid[0][0], grid[1][0], grid[2][0]],
      [grid[0][1], grid[1][1], grid[2][1]],
      [grid[0][2], grid[1][2], grid[2][2]],
      [grid[0][0], grid[0][1], grid[0][2]],
      [grid[1][0], grid[1][1], grid[1][2]],
      [grid[2][0], grid[2][1], grid[2][2]],
      [grid[0][0], grid[1][1], grid[2][2]],
      [grid[0][2], grid[1][1], grid[2][0]]
    ];

    let totalWin = 0;
    let winMessages = [];
    const scoreTable = getScores();

    lines.forEach(line => {
      if (line.every(cell => cell.value === line[0].value)) {
        const symbol = line[0].value;
        const winScore = (scoreTable[symbol] || 0) * betMultiplier;
        totalWin += winScore;
        winMessages.push(`${symbol} +${winScore}`);
        line.forEach(cell => cell.element.classList.add('yellow-win'));
    // ★ 심볼 맞출 경우 전체 반짝임 추가
if (symbol === '★') {
  const machine = document.getElementById('slot-machine');
  machine.classList.add('crazy-blink');
  setTimeout(() => machine.classList.remove('crazy-blink'), 2000);
}

  }
});
  

if (totalWin > 0) {
  if (Math.random() < 0.05) {
    totalWin *= 2;
    winMessages.push("🎉 터졌다!");
  }

  resultDisplay.textContent = `🎉 터졌다! ${winMessages.join(', ')}`;
  money += totalWin;

  // 🔊 당첨 효과음 재생
  bgm.pause();
  winSound.currentTime = 0;
  winSound.play().catch(() => {});

  // 효과음 끝나면 BGM 재개
  winSound.onended = () => {
    bgm.play().catch(() => {});
  };

    // ✅ 목표 초과 시 계속 스테이지 상승
  while (money >= target) {
    nextStage();
  }
} else {
  resultDisplay.textContent = '꽝!';
}

    updateDisplay();
    if (money < minBet) gameOver();
    else spinButton.disabled = false;
  }, 1000);
}


    spinButton.addEventListener('click', () => {
      if (!bgmStarted) {
        bgm.play().catch(() => {});
        bgmStarted = true;
      }
      spin();
    });

    restartButton.addEventListener('click', () => {
      money = 200;
      stage = 1;
      target = 400;
      spinCount = 0;
      gameEnded = false;
      resultDisplay.textContent = '';
      spinButton.disabled = false;
      restartButton.style.display = 'none';
      initReels();
      updateDisplay();
    });

    initReels();
    updateDisplay();
  </script>

  <!-- 랭킹 저장 (Firebase Firestore: slot_scores 컬렉션). 화면 요소는 추가하지 않음 -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, collection, addDoc, query, orderBy, limit, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
    import { firebaseConfig } from "/js/firebase-config.js";

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // 상위 기록을 불러와 화면 순위표에 표시
    async function loadSlotRanking() {
      const list = document.getElementById("rank-list");
      if (!list) return;
      try {
        const q = query(collection(db, "slot_scores"), orderBy("score", "desc"), limit(5));
        const snap = await getDocs(q);
        list.innerHTML = "";
        if (!snap.docs.length) {
          const li = document.createElement("li");
          const nm = document.createElement("span");
          nm.className = "rk-name";
          nm.textContent = "아직 기록이 없습니다";
          li.appendChild(nm);
          list.appendChild(li);
          return;
        }
        snap.docs.forEach((d, i) => {
          const x = d.data();
          const li = document.createElement("li");
          const nm = document.createElement("span");
          nm.className = "rk-name";
          nm.textContent = `${i + 1}. ${x.name || "익명"}`;
          const sc = document.createElement("span");
          sc.className = "rk-score";
          sc.textContent = `${x.score} 스테이지`;
          li.append(nm, sc);
          list.appendChild(li);
        });
      } catch (e) {
        console.error("슬롯 랭킹 로드 실패:", e);
      }
    }

    // 파산 시 gameOver()에서 호출: 도달 스테이지를 랭킹에 저장
    window.saveSlotScore = async function (name, score) {
      try {
        await addDoc(collection(db, "slot_scores"), {
          name,
          score,
          timestamp: new Date()
        });
        alert("랭킹에 저장되었습니다!");
        loadSlotRanking(); // 저장 후 순위표 갱신
      } catch (e) {
        console.error("슬롯 랭킹 저장 실패:", e);
      }
    };

    window.addEventListener("DOMContentLoaded", loadSlotRanking);
  </script>
</body>
</html>
